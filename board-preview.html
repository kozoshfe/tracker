<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Board Preview</title>
    <link rel="stylesheet" href="styles.css?v=34" />
    <style>
      body {
        display: grid;
        place-items: center;
        min-height: 100svh;
      }

      .screen {
        overflow: hidden;
      }

      .board-view {
        display: grid;
      }

      .tabs,
      .bottom-nav {
        display: grid;
      }

      .board-preview-row .board-task {
        cursor: default;
      }

      .board-preview-row .board-cell {
        cursor: default;
      }
    </style>
  </head>
  <body>
    <main class="app-shell" aria-label="Мої цілі">
      <section class="screen">
        <header class="topbar">
          <div>
            <p class="status-time">9:41</p>
            <h1>Мої цілі</h1>
          </div>
          <div class="top-actions">
            <button class="secondary-action header-logout" type="button">Вийти</button>
            <button class="icon-button" type="button" aria-label="Змінити тему">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></svg>
            </button>
            <button class="add-button" type="button" aria-label="Додати пункт">
              <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </header>

        <section class="board-view">
          <div class="board-toolbar">
            <button class="secondary-action board-manage" type="button">Редагувати</button>
            <button class="primary-action board-add" type="button">Додати пункт</button>
          </div>
          <article class="board-card">
            <div class="board-head">
              <span class="board-index">N</span>
              <span class="board-title">Таск</span>
              <span class="board-day">Пн</span>
              <span class="board-day">Вт</span>
              <span class="board-day">Ср</span>
              <span class="board-day">Чт</span>
              <span class="board-day">Пт</span>
              <span class="board-day">Сб</span>
              <span class="board-day">Нд</span>
            </div>
            <div class="board-body">
              <div class="board-row board-preview-row">
                <span class="board-row-index">1</span>
                <button class="board-task" type="button">
                  <span class="item-icon purple">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                  </span>
                  <strong>Вода щодня</strong>
                </button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell" type="button"></button>
              </div>
              <div class="board-row board-preview-row">
                <span class="board-row-index">2</span>
                <button class="board-task" type="button">
                  <span class="item-icon green">
                    <svg viewBox="0 0 24 24"><path d="M20 4c-8 0-13 4.5-13 11a5 5 0 0 0 5 5c6.5 0 8-8 8-16Z"/><path d="M4 20c3-6 8-9 14-11"/></svg>
                  </span>
                  <strong>Геднер + віти</strong>
                </button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell" type="button"></button>
              </div>
              <div class="board-row board-preview-row">
                <span class="board-row-index">3</span>
                <button class="board-task" type="button">
                  <span class="item-icon blue">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                  </span>
                  <strong>Пам'ять</strong>
                </button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell" type="button"></button>
                <button class="board-cell is-done" type="button"></button>
              </div>
            </div>
          </article>
        </section>

        <nav class="bottom-nav" aria-label="Основна навігація">
          <button class="nav-item active" type="button">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            <small>Борда</small>
          </button>
          <button class="nav-item" type="button">
            <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
            <small>Список</small>
          </button>
          <button class="nav-item" type="button">
            <svg viewBox="0 0 24 24"><path d="M6 20V10M12 20V4M18 20v-7"/></svg>
            <small>Статистика</small>
          </button>
          <button class="nav-item" type="button">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            <small>Крипта</small>
          </button>
          <button class="nav-item" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.94a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.88.34H9a1.7 1.7 0 0 0 1-1.56V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.88V9c.12.58.76 1 1.56 1H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"/></svg>
            <small>Налаштування</small>
          </button>
        </nav>
      </section>
    </main>
  </body>
</html>
