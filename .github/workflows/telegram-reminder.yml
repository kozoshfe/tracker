name: Telegram reminder

on:
  schedule:
    # GitHub cron is UTC and may be delayed or occasionally dropped.
    # Run several attempts during the hour that maps to 23:xx in Europe/Kyiv.
    # Summer time: 20:xx UTC -> 23:xx Kyiv.
    # Winter time: 21:xx UTC -> 23:xx Kyiv.
    - cron: "10,25,40,55 20,21 * * *"
    # Temporary test runs for 2026-05-07. Remove after the scheduled test works.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Send immediately, even outside 23:00 Europe/Kyiv"
        required: false
        default: "true"

concurrency:
  group: telegram-reminder
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Compute Kyiv date
        id: kyiv
        run: |
          echo "date=$(TZ=Europe/Kyiv date +%F)" >> "$GITHUB_OUTPUT"
          echo "time=$(TZ=Europe/Kyiv date +%H:%M)" >> "$GITHUB_OUTPUT"

      - name: Restore sent marker
        id: sent-cache
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.force != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: .telegram-reminder-sent
          key: telegram-reminder-sent-${{ steps.kyiv.outputs.date }}

      - name: Restore test marker
        id: test-cache
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.force != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: .telegram-reminder-test-sent
          key: telegram-reminder-test-sent-${{ steps.kyiv.outputs.date }}

      - name: Send Telegram reminder
        id: send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_REMINDER_TEXT: ${{ vars.TELEGRAM_REMINDER_TEXT }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' }}
          ALREADY_SENT: ${{ steps.sent-cache.outputs.cache-hit == 'true' }}
          TEST_ALREADY_SENT: ${{ steps.test-cache.outputs.cache-hit == 'true' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          weekdays = {
              0: "Понеділок",
              1: "Вівторок",
              2: "Середа",
              3: "Четвер",
              4: "П'ятниця",
              5: "Субота",
              6: "Неділя",
          }

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          text = os.environ.get("TELEGRAM_REMINDER_TEXT", "").strip()
          force_send = os.environ.get("FORCE_SEND") == "true"
          already_sent = os.environ.get("ALREADY_SENT") == "true"
          test_already_sent = os.environ.get("TEST_ALREADY_SENT") == "true"
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          event_schedule = os.environ.get("GITHUB_EVENT_SCHEDULE", "")

          now = datetime.now(ZoneInfo("Europe/Kyiv"))
          is_test_schedule = (
              event_schedule == "*/5 * * * *"
              and now.strftime("%Y-%m-%d") == "2026-05-07"
          )
          summary_lines = [
              "## Telegram reminder",
              "",
              f"- Event: `{event_name}`",
              f"- Schedule: `{event_schedule or 'manual'}`",
              f"- Europe/Kyiv time: `{now:%Y-%m-%d %H:%M:%S %Z}`",
              f"- Force send: `{force_send}`",
              f"- Test schedule: `{is_test_schedule}`",
              f"- Already sent today: `{already_sent}`",
              f"- Test already sent today: `{test_already_sent}`",
          ]

          def finish(result, exit_code=0):
              summary_lines.append(f"- Result: `{result}`")
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if summary_path:
                  with open(summary_path, "a", encoding="utf-8") as summary:
                      summary.write("\n".join(summary_lines) + "\n")
              print(result)
              sys.exit(exit_code)

          def telegram_request(method, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/{method}",
                  data=data,
                  headers={"Content-Type": "application/json"},
                  method="GET" if data is None else "POST",
              )

              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      raw = response.read().decode("utf-8", errors="replace")
                      return response.status, json.loads(raw)
              except urllib.error.HTTPError as error:
                  raw = error.read().decode("utf-8", errors="replace")
                  try:
                      body = json.loads(raw)
                  except json.JSONDecodeError:
                      body = {"raw": raw}
                  return error.code, body

          if not token or not chat_id:
              finish("missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID", 1)

          if is_test_schedule and test_already_sent:
              finish("skipped: test reminder already sent today")

          if already_sent and not force_send and not is_test_schedule:
              finish("skipped: reminder already sent today")

          if not force_send and not is_test_schedule and now.hour != 23:
              finish(f"skipped: Europe/Kyiv time is {now:%H:%M}, not in the 23:00 hour")

          status, get_me = telegram_request("getMe")
          if status != 200 or not get_me.get("ok"):
              summary_lines.append(f"- Telegram getMe status: `{status}`")
              summary_lines.append(f"- Telegram getMe response: `{json.dumps(get_me, ensure_ascii=False)}`")
              finish("failed: bot token is invalid or Telegram getMe failed", 1)

          if not text:
              text = "Перевір, чи закрив всі завдання на сьогодні"

          message = f"Сьогодні: {weekdays[now.weekday()]}\n\n{text}"
          status, send_result = telegram_request("sendMessage", {
              "chat_id": chat_id,
              "text": message,
              "disable_web_page_preview": True,
          })

          summary_lines.append(f"- Telegram sendMessage status: `{status}`")

          if status != 200 or not send_result.get("ok"):
              summary_lines.append(f"- Telegram sendMessage response: `{json.dumps(send_result, ensure_ascii=False)}`")
              finish("failed: Telegram did not accept the message", 1)

          marker_path = ".telegram-reminder-test-sent" if is_test_schedule else ".telegram-reminder-sent"
          with open(marker_path, "w", encoding="utf-8") as marker:
              marker.write(f"{now:%Y-%m-%d %H:%M:%S %Z}\n")

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output and is_test_schedule:
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write("test_sent=true\n")
          elif github_output:
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write("sent=true\n")

          finish("sent")
          PY

      - name: Save sent marker
        if: ${{ steps.send.outputs.sent == 'true' && github.event_name != 'workflow_dispatch' && steps.sent-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .telegram-reminder-sent
          key: telegram-reminder-sent-${{ steps.kyiv.outputs.date }}

      - name: Save test marker
        if: ${{ steps.send.outputs.test_sent == 'true' && github.event_name != 'workflow_dispatch' && steps.test-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .telegram-reminder-test-sent
          key: telegram-reminder-test-sent-${{ steps.kyiv.outputs.date }}
