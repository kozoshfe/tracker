<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Відновлення даних</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #080812;
        color: #f7f2ff;
        font: 600 18px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <main id="status">Відновлюю дані...</main>
    <script>
      const statusEl = document.getElementById('status');

      fetch('restore-desktop-state.json', { cache: 'no-store' })
        .then((response) => {
          if (!response.ok) throw new Error('Не вдалося прочитати файл відновлення.');
          return response.json();
        })
        .then((state) => {
          state.updatedAt = new Date().toISOString();
          localStorage.setItem('goals-pwa-state', JSON.stringify(state));
          statusEl.textContent = 'Дані відновлено. Відкриваю додаток...';
          window.location.replace('/');
        })
        .catch((error) => {
          statusEl.textContent = error.message || 'Помилка відновлення.';
        });
    </script>
  </body>
</html>
